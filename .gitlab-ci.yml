# 20260931-overleaf-diplomarbeit (thesis, Projekt 289) — GitLab CI/CD (REV 2, 2026-06-27): §7 Hard-Gate (0 Fehler / <=1 bekannte Warning / .blg ohne Repeated-entry)
# ─────────────────────────────────────────────────────────────────────────────
# P1c (User-Wahl 2026-06-25): „Voll inkl. PDF, latexmk via Infra" — TeXLive ist Runner-Voraussetzung
# (Infra installiert texlive vor). Bis dahin sind chktex + thesis:pdf per COMDARE_TEXLIVE_AVAILABLE
# gegatet (sonst sicherer Fail an „fehlt"). gitleaks (hermetisch) laeuft sofort = harter Secrets-Gate.
#
# ⚠️ OVERLEAF-HINWEIS: Dieses Repo ist Overleaf-gekoppelt. Diese .gitlab-ci.yml lebt auf `main`.
#   Overleaf synct typischerweise eigene dated Branches (z.B. overleaf-2026-06-22-1726) -> main bleibt
#   unberuehrt. Falls dein Sync main ueberschreibt, bitte melden (die Datei ist reversibel).

include:
  - project: 'comdare/cluster/ci-templates'
    ref: development
    file: '/base-pipeline.yml'

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - lint
  - thesis-pdf

variables:
  GIT_SUBMODULE_STRATEGY: none

# ── Stufe 1: Secrets (gitleaks, hermetisch) — HART, laeuft sofort ──
lint:secrets:
  extends: .lint-secrets
  tags: [baremetal]

# ── LaTeX-Lint (chktex) — TeXLive = Infra-Voraussetzung; advisory (wie clang-format/cppcheck) ──
lint:latex:
  stage: lint
  tags: [baremetal]
  needs: []
  allow_failure: true
  rules:
    - if: '$COMDARE_TEXLIVE_AVAILABLE == "true"'
  script:
    - 'command -v chktex >/dev/null 2>&1 || { echo "chktex (texlive) fehlt — Infra-Voraussetzung (P1c)"; exit 1; }'
    - 'echo "== chktex ueber alle .tex =="'
    # REV2 (Codex-Befund): KEIN `|| true` mehr — chktex-Befunde bleiben sichtbar.
    # Dash-/Identifier-Konventionen des Dokuments: .chktexrc (Repo-Root, wird via CWD gelesen).
    # -n36 (Space vor/nach Klammer): alle 251 Befunde klassifiziert (2026-07-06) = ausnahmslos
    # False-Positives auf Code-Identifiern (create_anatomy(), zipfian(.99), \allowbreak-Namen)
    # und deutschen Klammer-Komposita ((Bundle-)Prefetch) — 0 echte Prosa-Spacing-Fehler.
    - 'find . -name "*.tex" -not -path "./_*" -print0 | xargs -0 -r chktex -q -n36'

# ── thesis-PDF (latexmk) — TeXLive = Infra-Voraussetzung ──
thesis:pdf:
  stage: thesis-pdf
  tags: [baremetal]
  needs: []
  rules:
    - if: '$COMDARE_TEXLIVE_AVAILABLE == "true"'
  variables:
    COMDARE_THESIS_KNOWN_WARNINGS: "1"   # §7: genau EINE bekannte (User-akzeptierte) Warning erlaubt; sonst gilt das Dokument als kaputt
  script:
    - 'command -v latexmk >/dev/null 2>&1 || { echo "latexmk (texlive) fehlt — Infra-Voraussetzung (P1c)"; exit 1; }'
    - latexmk -pdf -interaction=nonstopmode -halt-on-error diplomarbeit.tex
    # ── §7 Hard-Gate: 0 Fehler (latexmk -halt-on-error oben) + <= bekannte Warnings + .blg ohne Repeated-entry/Warning ──
    - 'test -s diplomarbeit.log || { echo "GATE-FAIL: diplomarbeit.log fehlt (Build unvollstaendig)"; exit 1; }; W=$(grep -c "LaTeX Warning" diplomarbeit.log 2>/dev/null || true); W=${W:-0}; echo "LaTeX-Warnings=$W (erlaubt <=${COMDARE_THESIS_KNOWN_WARNINGS})"; test "$W" -le "${COMDARE_THESIS_KNOWN_WARNINGS}" || { echo "GATE-FAIL: $W LaTeX-Warnings > ${COMDARE_THESIS_KNOWN_WARNINGS} bekannte -> Dokument unordentlich"; exit 1; }'
    - 'if [ -f diplomarbeit.blg ]; then R=$(grep -ciE "Repeated entry|Warning--" diplomarbeit.blg 2>/dev/null || true); R=${R:-0}; echo "BibTeX .blg Warnings/Repeated=$R"; test "$R" -eq 0 || { echo "GATE-FAIL: .blg unsauber ($R Repeated/Warning) -> Literatur pruefen"; exit 1; }; else echo ".blg nicht vorhanden (keine BibTeX-Stufe in diesem Lauf)"; fi'
  artifacts:
    paths:
      - diplomarbeit.pdf
    when: always
    expire_in: 4 weeks
